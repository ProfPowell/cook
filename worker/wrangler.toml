# Cloudflare Worker configuration for Cook content negotiation
# https://developers.cloudflare.com/workers/wrangler/configuration/

name = "cook-site"
main = "index.js"
compatibility_date = "2024-12-01"

# Serve static assets from the Cook dist/ output
[assets]
directory = "../dist"

